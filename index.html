<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Login</title>
</head>
<body>
  <main>
    <div class="login">
     <h1>Login</h1>
      <input type="email" placeholder="Email" class="email" id="email">
      <div class="senhaImagem">
      <input type="password" placeholder="Senha" class="senha" id="senha">
        <button onClick="olho()" class="botaoOlho" id="btnOlho">
        <img src="./olhoFechado.png" class="olho" id="imagem">
        </button>
      </div>       
      <a href="">Esqueci a senha</a>
      <p class="mensagem" id="mensagem"></p>
      <button class="entrar" id="entrar">ENTRAR </button>
      <a href="">Não tenho uma conta</a>
    </div>
  </main>
</body>
<script src="script.js"></script>
</html>
